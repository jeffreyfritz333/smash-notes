<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg-Snake" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0d06"/>
      <stop offset="45%" stop-color="#263015"/>
      <stop offset="100%" stop-color="#231105"/>
    </linearGradient>
    <radialGradient id="glow-Snake" cx="50%" cy="44%" r="52%">
      <stop offset="0%" stop-color="#88976d" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#ae7d5a" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ae7d5a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="emb-Snake" x1="80" y1="20" x2="140" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#aab597"/>
      <stop offset="100%" stop-color="#daded1"/>
    </linearGradient>
    <linearGradient id="accent-Snake" x1="0" y1="200" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8b4513" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#8b4513" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clip-Snake">
      <rect width="200" height="200" rx="28"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip-Snake)">
    <rect width="200" height="200" fill="url(#bg-Snake)"/>
    <ellipse cx="100" cy="88" rx="110" ry="100" fill="url(#glow-Snake)"/>

    <!-- Accent color wash -->
    <rect width="200" height="200" fill="url(#accent-Snake)"/>

    <!-- Emblem -->
    <g fill="url(#emb-Snake)" opacity="0.92">
      <rect x="42" y="82" width="116" height="80" rx="6"/>
     <polygon points="42,82 60,58 156,58 158,82"/>
     <rect x="92" y="28" width="16" height="36" rx="5" opacity="0.7"/>
     <circle cx="100" cy="76" r="8" opacity="0.7"/>
    </g>
  </g>

  <!-- Border with primary color -->
  <rect width="200" height="200" rx="28" fill="none" stroke="#556b2f" stroke-width="3" opacity="0.45"/>
</svg>