<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg-Sephiroth" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#191919"/>
      <stop offset="45%" stop-color="#5f5f5f"/>
      <stop offset="100%" stop-color="#130021"/>
    </linearGradient>
    <radialGradient id="glow-Sephiroth" cx="50%" cy="44%" r="52%">
      <stop offset="0%" stop-color="#e0e0e0" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#814da8" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#814da8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="emb-Sephiroth" x1="80" y1="20" x2="140" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c8c8c8"/>
      <stop offset="100%" stop-color="#dadada"/>
    </linearGradient>
    <linearGradient id="accent-Sephiroth" x1="0" y1="200" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4b0082" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#4b0082" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clip-Sephiroth">
      <rect width="200" height="200" rx="28"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip-Sephiroth)">
    <rect width="200" height="200" fill="url(#bg-Sephiroth)"/>
    <ellipse cx="100" cy="88" rx="110" ry="100" fill="url(#glow-Sephiroth)"/>

    <!-- Accent color wash -->
    <rect width="200" height="200" fill="url(#accent-Sephiroth)"/>

    <!-- Emblem -->
    <g fill="url(#emb-Sephiroth)" opacity="0.92">
      <rect x="96" y="16" width="8" height="168" rx="2"/>
     <polygon points="100,12 92,26 108,26"/>
     <path d="M108 60 Q132 52 160 68 Q172 78 164 92 Q148 112 120 100 Q108 94 108 80z"/>
     <path d="M108 70 Q128 64 148 76 Q156 84 150 92 Q138 104 120 96z" opacity="0.3"/>
    </g>
  </g>

  <!-- Border with primary color -->
  <rect width="200" height="200" rx="28" fill="none" stroke="#d3d3d3" stroke-width="3" opacity="0.45"/>
</svg>