<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg-Hero" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#080d1b"/>
      <stop offset="45%" stop-color="#1d2f65"/>
      <stop offset="100%" stop-color="#3d3500"/>
    </linearGradient>
    <radialGradient id="glow-Hero" cx="50%" cy="44%" r="52%">
      <stop offset="0%" stop-color="#7a96ea" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#f8e04d" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#f8e04d" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="emb-Hero" x1="80" y1="20" x2="140" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a0b4f0"/>
      <stop offset="100%" stop-color="#d5def8"/>
    </linearGradient>
    <linearGradient id="accent-Hero" x1="0" y1="200" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f5d300" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#f5d300" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clip-Hero">
      <rect width="200" height="200" rx="28"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip-Hero)">
    <rect width="200" height="200" fill="url(#bg-Hero)"/>
    <ellipse cx="100" cy="88" rx="110" ry="100" fill="url(#glow-Hero)"/>

    <!-- Accent color wash -->
    <rect width="200" height="200" fill="url(#accent-Hero)"/>

    <!-- Emblem -->
    <g fill="url(#emb-Hero)" opacity="0.92">
      <path d="M100 36 Q44 36 36 108 Q36 160 100 164 Q164 160 164 108 Q156 36 100 36z"/>
     <circle cx="82" cy="96" r="10" opacity="0.3"/>
     <circle cx="118" cy="96" r="10" opacity="0.3"/>
     <path d="M88 118 Q100 130 112 118" fill="none" stroke="rgba(0,0,0,0.15)" stroke-width="3"/>
    </g>
  </g>

  <!-- Border with primary color -->
  <rect width="200" height="200" rx="28" fill="none" stroke="#4169e1" stroke-width="3" opacity="0.45"/>
</svg>