<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg-Young_Link" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00140a"/>
      <stop offset="45%" stop-color="#004b24"/>
      <stop offset="100%" stop-color="#2c2316"/>
    </linearGradient>
    <radialGradient id="glow-Young_Link" cx="50%" cy="44%" r="52%">
      <stop offset="0%" stop-color="#4dc185" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#c8af89" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#c8af89" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="emb-Young_Link" x1="80" y1="20" x2="140" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#80d3a8"/>
      <stop offset="100%" stop-color="#c7ebd9"/>
    </linearGradient>
    <linearGradient id="accent-Young_Link" x1="0" y1="200" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#b08d57" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#b08d57" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clip-Young_Link">
      <rect width="200" height="200" rx="28"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip-Young_Link)">
    <rect width="200" height="200" fill="url(#bg-Young_Link)"/>
    <ellipse cx="100" cy="88" rx="110" ry="100" fill="url(#glow-Young_Link)"/>

    <!-- Accent color wash -->
    <rect width="200" height="200" fill="url(#accent-Young_Link)"/>

    <!-- Emblem -->
    <g fill="url(#emb-Young_Link)" opacity="0.92">
      <path d="M100 36L154 72v48c0 24-54 48-54 48s-54-24-54-48V72z"/>
     <path d="M100 56L140 82v32c0 16-40 34-40 34s-40-18-40-34V82z" opacity="0.3"/>
     <circle cx="100" cy="94" r="12" opacity="0.25"/>
    </g>
  </g>

  <!-- Border with primary color -->
  <rect width="200" height="200" rx="28" fill="none" stroke="#00a651" stroke-width="3" opacity="0.45"/>
</svg>