<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg-Corrin" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#191919"/>
      <stop offset="45%" stop-color="#5f5f5f"/>
      <stop offset="100%" stop-color="#3a0005"/>
    </linearGradient>
    <radialGradient id="glow-Corrin" cx="50%" cy="44%" r="52%">
      <stop offset="0%" stop-color="#e0e0e0" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#ee4d59" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ee4d59" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="emb-Corrin" x1="80" y1="20" x2="140" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c8c8c8"/>
      <stop offset="100%" stop-color="#dadada"/>
    </linearGradient>
    <linearGradient id="accent-Corrin" x1="0" y1="200" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e60012" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#e60012" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clip-Corrin">
      <rect width="200" height="200" rx="28"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip-Corrin)">
    <rect width="200" height="200" fill="url(#bg-Corrin)"/>
    <ellipse cx="100" cy="88" rx="110" ry="100" fill="url(#glow-Corrin)"/>

    <!-- Accent color wash -->
    <rect width="200" height="200" fill="url(#accent-Corrin)"/>

    <!-- Emblem -->
    <g fill="url(#emb-Corrin)" opacity="0.92">
      <path d="M100 28 L74 98 L60 86 L80 150 L100 130 L120 150 L140 86 L126 98z"/>
     <circle cx="100" cy="100" r="14" opacity="0.3"/>
    </g>
  </g>

  <!-- Border with primary color -->
  <rect width="200" height="200" rx="28" fill="none" stroke="#d3d3d3" stroke-width="3" opacity="0.45"/>
</svg>