<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg-Ice_Climbers" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#10191c"/>
      <stop offset="45%" stop-color="#3d5d6a"/>
      <stop offset="100%" stop-color="#401b27"/>
    </linearGradient>
    <radialGradient id="glow-Ice_Climbers" cx="50%" cy="44%" r="52%">
      <stop offset="0%" stop-color="#abddf1" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#ff97ba" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ff97ba" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="emb-Ice_Climbers" x1="80" y1="20" x2="140" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#80c4df"/>
      <stop offset="100%" stop-color="#99d5ee"/>
    </linearGradient>
    <linearGradient id="accent-Ice_Climbers" x1="0" y1="200" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff6b9d" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ff6b9d" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clip-Ice_Climbers">
      <rect width="200" height="200" rx="28"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip-Ice_Climbers)">
    <rect width="200" height="200" fill="url(#bg-Ice_Climbers)"/>
    <ellipse cx="100" cy="88" rx="110" ry="100" fill="url(#glow-Ice_Climbers)"/>

    <!-- Accent color wash -->
    <rect width="200" height="200" fill="url(#accent-Ice_Climbers)"/>

    <!-- Emblem -->
    <g fill="url(#emb-Ice_Climbers)" opacity="0.92">
      <polygon points="100,26 170,156 30,156"/>
     <polygon points="100,60 150,146 50,146" opacity="0.2"/>
     <rect x="82" y="100" width="10" height="56" rx="3" opacity="0.5"/>
     <rect x="68" y="88" width="38" height="18" rx="6" opacity="0.5"/>
    </g>
  </g>

  <!-- Border with primary color -->
  <rect width="200" height="200" rx="28" fill="none" stroke="#87ceeb" stroke-width="3" opacity="0.45"/>
</svg>