<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg-Dr__Mario" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1c0002"/>
      <stop offset="45%" stop-color="#670008"/>
      <stop offset="100%" stop-color="#101a38"/>
    </linearGradient>
    <radialGradient id="glow-Dr__Mario" cx="50%" cy="44%" r="52%">
      <stop offset="0%" stop-color="#ee4d59" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#7a96ea" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#7a96ea" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="emb-Dr__Mario" x1="80" y1="20" x2="140" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f38089"/>
      <stop offset="100%" stop-color="#fac7cb"/>
    </linearGradient>
    <linearGradient id="accent-Dr__Mario" x1="0" y1="200" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4169e1" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#4169e1" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clip-Dr__Mario">
      <rect width="200" height="200" rx="28"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip-Dr__Mario)">
    <rect width="200" height="200" fill="url(#bg-Dr__Mario)"/>
    <ellipse cx="100" cy="88" rx="110" ry="100" fill="url(#glow-Dr__Mario)"/>

    <!-- Accent color wash -->
    <rect width="200" height="200" fill="url(#accent-Dr__Mario)"/>

    <!-- Emblem -->
    <g fill="url(#emb-Dr__Mario)" opacity="0.92">
      <rect x="58" y="60" width="84" height="40" rx="20"/>
     <rect x="100" y="60" width="42" height="40" rx="0" opacity="0.35"/>
     <rect x="72" y="110" width="56" height="40" rx="20"/>
     <rect x="100" y="110" width="28" height="40" rx="0" opacity="0.35"/>
    </g>
  </g>

  <!-- Border with primary color -->
  <rect width="200" height="200" rx="28" fill="none" stroke="#e60012" stroke-width="3" opacity="0.45"/>
</svg>