<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg-Donkey_Kong" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f0904"/>
      <stop offset="45%" stop-color="#38220d"/>
      <stop offset="100%" stop-color="#3a0005"/>
    </linearGradient>
    <radialGradient id="glow-Donkey_Kong" cx="50%" cy="44%" r="52%">
      <stop offset="0%" stop-color="#a38162" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#ee4d59" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ee4d59" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="emb-Donkey_Kong" x1="80" y1="20" x2="140" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#bea58f"/>
      <stop offset="100%" stop-color="#e2d7ce"/>
    </linearGradient>
    <linearGradient id="accent-Donkey_Kong" x1="0" y1="200" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e60012" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#e60012" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clip-Donkey_Kong">
      <rect width="200" height="200" rx="28"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip-Donkey_Kong)">
    <rect width="200" height="200" fill="url(#bg-Donkey_Kong)"/>
    <ellipse cx="100" cy="88" rx="110" ry="100" fill="url(#glow-Donkey_Kong)"/>

    <!-- Accent color wash -->
    <rect width="200" height="200" fill="url(#accent-Donkey_Kong)"/>

    <!-- Emblem -->
    <g fill="url(#emb-Donkey_Kong)" opacity="0.92">
      <ellipse cx="100" cy="100" rx="56" ry="62"/>
     <ellipse cx="100" cy="100" rx="56" ry="62" fill="none" stroke="rgba(0,0,0,0.15)" stroke-width="8"/>
     <rect x="94" y="38" width="12" height="124" rx="4" opacity="0.2"/>
     <rect x="44" y="94" width="112" height="12" rx="4" opacity="0.2"/>
    </g>
  </g>

  <!-- Border with primary color -->
  <rect width="200" height="200" rx="28" fill="none" stroke="#7c4b1e" stroke-width="3" opacity="0.45"/>
</svg>