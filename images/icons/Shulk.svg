<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg-Shulk" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1c0002"/>
      <stop offset="45%" stop-color="#670008"/>
      <stop offset="100%" stop-color="#003040"/>
    </linearGradient>
    <radialGradient id="glow-Shulk" cx="50%" cy="44%" r="52%">
      <stop offset="0%" stop-color="#ee4d59" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#4dd2ff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#4dd2ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="emb-Shulk" x1="80" y1="20" x2="140" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f38089"/>
      <stop offset="100%" stop-color="#fac7cb"/>
    </linearGradient>
    <linearGradient id="accent-Shulk" x1="0" y1="200" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00bfff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#00bfff" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clip-Shulk">
      <rect width="200" height="200" rx="28"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip-Shulk)">
    <rect width="200" height="200" fill="url(#bg-Shulk)"/>
    <ellipse cx="100" cy="88" rx="110" ry="100" fill="url(#glow-Shulk)"/>

    <!-- Accent color wash -->
    <rect width="200" height="200" fill="url(#accent-Shulk)"/>

    <!-- Emblem -->
    <g fill="url(#emb-Shulk)" stroke="url(#emb-Shulk)" opacity="0.92">
      <circle cx="100" cy="96" r="54" fill="none" stroke="currentColor" stroke-width="12"/>
     <rect x="86" y="62" width="28" height="68" rx="6"/>
     <polygon points="100,46 90,66 110,66"/>
     <rect x="92" y="126" width="16" height="20" rx="4" opacity="0.6"/>
    </g>
  </g>

  <!-- Border with primary color -->
  <rect width="200" height="200" rx="28" fill="none" stroke="#e60012" stroke-width="3" opacity="0.45"/>
</svg>