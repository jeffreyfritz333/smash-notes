<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg-Luigi" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00140a"/>
      <stop offset="45%" stop-color="#004b24"/>
      <stop offset="100%" stop-color="#170f23"/>
    </linearGradient>
    <radialGradient id="glow-Luigi" cx="50%" cy="44%" r="52%">
      <stop offset="0%" stop-color="#4dc185" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#8c75af" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#8c75af" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="emb-Luigi" x1="80" y1="20" x2="140" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#80d3a8"/>
      <stop offset="100%" stop-color="#c7ebd9"/>
    </linearGradient>
    <linearGradient id="accent-Luigi" x1="0" y1="200" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5b3a8c" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#5b3a8c" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clip-Luigi">
      <rect width="200" height="200" rx="28"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip-Luigi)">
    <rect width="200" height="200" fill="url(#bg-Luigi)"/>
    <ellipse cx="100" cy="88" rx="110" ry="100" fill="url(#glow-Luigi)"/>

    <!-- Accent color wash -->
    <rect width="200" height="200" fill="url(#accent-Luigi)"/>

    <!-- Emblem -->
    <g fill="url(#emb-Luigi)" opacity="0.92">
      <path d="M100 38c-38 0-60 28-60 62 0 16 6 30 16 40l-8 18 22-8c8 4 18 6 30 6s22-2 30-6l22 8-8-18c10-10 16-24 16-40 0-34-22-62-60-62z"/>
     <circle cx="82" cy="90" r="8" opacity="0.3"/>
     <circle cx="118" cy="90" r="8" opacity="0.3"/>
    </g>
  </g>

  <!-- Border with primary color -->
  <rect width="200" height="200" rx="28" fill="none" stroke="#00a651" stroke-width="3" opacity="0.45"/>
</svg>