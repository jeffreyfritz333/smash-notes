<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg-Ness" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1c0002"/>
      <stop offset="45%" stop-color="#670008"/>
      <stop offset="100%" stop-color="#3d3500"/>
    </linearGradient>
    <radialGradient id="glow-Ness" cx="50%" cy="44%" r="52%">
      <stop offset="0%" stop-color="#ee4d59" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#f8e04d" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#f8e04d" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="emb-Ness" x1="80" y1="20" x2="140" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f38089"/>
      <stop offset="100%" stop-color="#fac7cb"/>
    </linearGradient>
    <linearGradient id="accent-Ness" x1="0" y1="200" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f5d300" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#f5d300" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clip-Ness">
      <rect width="200" height="200" rx="28"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip-Ness)">
    <rect width="200" height="200" fill="url(#bg-Ness)"/>
    <ellipse cx="100" cy="88" rx="110" ry="100" fill="url(#glow-Ness)"/>

    <!-- Accent color wash -->
    <rect width="200" height="200" fill="url(#accent-Ness)"/>

    <!-- Emblem -->
    <g fill="url(#emb-Ness)" opacity="0.92">
      <path d="M56 96c0-30 20-54 44-54s44 24 44 54z"/>
     <rect x="44" y="90" width="112" height="14" rx="7"/>
     <polygon points="100,130 106,144 122,146 110,156 114,172 100,164 86,172 90,156 78,146 94,144" opacity="0.6"/>
    </g>
  </g>

  <!-- Border with primary color -->
  <rect width="200" height="200" rx="28" fill="none" stroke="#e60012" stroke-width="3" opacity="0.45"/>
</svg>