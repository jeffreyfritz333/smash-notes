<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg-Greninja" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#03030d"/>
      <stop offset="45%" stop-color="#0c0c31"/>
      <stop offset="100%" stop-color="#3a0005"/>
    </linearGradient>
    <radialGradient id="glow-Greninja" cx="50%" cy="44%" r="52%">
      <stop offset="0%" stop-color="#5f5f98" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#ee4d59" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ee4d59" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="emb-Greninja" x1="80" y1="20" x2="140" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8d8db6"/>
      <stop offset="100%" stop-color="#cdcddf"/>
    </linearGradient>
    <linearGradient id="accent-Greninja" x1="0" y1="200" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e60012" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#e60012" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clip-Greninja">
      <rect width="200" height="200" rx="28"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip-Greninja)">
    <rect width="200" height="200" fill="url(#bg-Greninja)"/>
    <ellipse cx="100" cy="88" rx="110" ry="100" fill="url(#glow-Greninja)"/>

    <!-- Accent color wash -->
    <rect width="200" height="200" fill="url(#accent-Greninja)"/>

    <!-- Emblem -->
    <g fill="url(#emb-Greninja)" opacity="0.92">
      <polygon points="100,30 108,84 160,56 116,96 168,112 112,108 100,170 88,108 32,112 84,96 40,56 92,84"/>
    </g>
  </g>

  <!-- Border with primary color -->
  <rect width="200" height="200" rx="28" fill="none" stroke="#1a1a6c" stroke-width="3" opacity="0.45"/>
</svg>