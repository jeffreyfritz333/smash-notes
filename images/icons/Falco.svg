<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg-Falco" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#000a16"/>
      <stop offset="45%" stop-color="#002753"/>
      <stop offset="100%" stop-color="#3a0005"/>
    </linearGradient>
    <radialGradient id="glow-Falco" cx="50%" cy="44%" r="52%">
      <stop offset="0%" stop-color="#4d89cd" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#ee4d59" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ee4d59" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="emb-Falco" x1="80" y1="20" x2="140" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#80abdc"/>
      <stop offset="100%" stop-color="#c7daef"/>
    </linearGradient>
    <linearGradient id="accent-Falco" x1="0" y1="200" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e60012" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#e60012" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clip-Falco">
      <rect width="200" height="200" rx="28"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip-Falco)">
    <rect width="200" height="200" fill="url(#bg-Falco)"/>
    <ellipse cx="100" cy="88" rx="110" ry="100" fill="url(#glow-Falco)"/>

    <!-- Accent color wash -->
    <rect width="200" height="200" fill="url(#accent-Falco)"/>

    <!-- Emblem -->
    <g fill="url(#emb-Falco)" opacity="0.92">
      <path d="M100 28 C68 42 42 84 46 132 L72 120 C60 88 76 58 100 48 C124 58 140 88 128 120 L154 132 C158 84 132 42 100 28z"/>
    </g>
  </g>

  <!-- Border with primary color -->
  <rect width="200" height="200" rx="28" fill="none" stroke="#0057b8" stroke-width="3" opacity="0.45"/>
</svg>