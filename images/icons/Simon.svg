<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg-Simon" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#110802"/>
      <stop offset="45%" stop-color="#3f1f09"/>
      <stop offset="100%" stop-color="#3a0005"/>
    </linearGradient>
    <radialGradient id="glow-Simon" cx="50%" cy="44%" r="52%">
      <stop offset="0%" stop-color="#ae7d5a" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#ee4d59" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ee4d59" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="emb-Simon" x1="80" y1="20" x2="140" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c5a289"/>
      <stop offset="100%" stop-color="#e5d6cb"/>
    </linearGradient>
    <linearGradient id="accent-Simon" x1="0" y1="200" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e60012" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#e60012" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clip-Simon">
      <rect width="200" height="200" rx="28"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip-Simon)">
    <rect width="200" height="200" fill="url(#bg-Simon)"/>
    <ellipse cx="100" cy="88" rx="110" ry="100" fill="url(#glow-Simon)"/>

    <!-- Accent color wash -->
    <rect width="200" height="200" fill="url(#accent-Simon)"/>

    <!-- Emblem -->
    <g fill="url(#emb-Simon)" stroke="url(#emb-Simon)" opacity="0.92">
      <path d="M60 156 Q40 120 60 96 Q80 72 100 88 Q120 104 140 80 Q160 56 148 36" fill="none" stroke="currentColor" stroke-width="12" stroke-linecap="round"/>
     <polygon points="148,36 164,24 158,48" opacity="0.7"/>
    </g>
  </g>

  <!-- Border with primary color -->
  <rect width="200" height="200" rx="28" fill="none" stroke="#8b4513" stroke-width="3" opacity="0.45"/>
</svg>