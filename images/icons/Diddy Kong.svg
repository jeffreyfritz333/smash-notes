<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg-Diddy_Kong" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1c0002"/>
      <stop offset="45%" stop-color="#670008"/>
      <stop offset="100%" stop-color="#3d3500"/>
    </linearGradient>
    <radialGradient id="glow-Diddy_Kong" cx="50%" cy="44%" r="52%">
      <stop offset="0%" stop-color="#ee4d59" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#f8e04d" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#f8e04d" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="emb-Diddy_Kong" x1="80" y1="20" x2="140" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f38089"/>
      <stop offset="100%" stop-color="#fac7cb"/>
    </linearGradient>
    <linearGradient id="accent-Diddy_Kong" x1="0" y1="200" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f5d300" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#f5d300" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clip-Diddy_Kong">
      <rect width="200" height="200" rx="28"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip-Diddy_Kong)">
    <rect width="200" height="200" fill="url(#bg-Diddy_Kong)"/>
    <ellipse cx="100" cy="88" rx="110" ry="100" fill="url(#glow-Diddy_Kong)"/>

    <!-- Accent color wash -->
    <rect width="200" height="200" fill="url(#accent-Diddy_Kong)"/>

    <!-- Emblem -->
    <g fill="url(#emb-Diddy_Kong)" opacity="0.92">
      <path d="M64 54 Q100 28 136 54 L130 72 Q100 52 70 72z"/>
     <ellipse cx="100" cy="100" rx="22" ry="46" transform="rotate(-15 100 100)"/>
     <ellipse cx="100" cy="100" rx="14" ry="38" transform="rotate(-15 100 100)" opacity="0.25"/>
    </g>
  </g>

  <!-- Border with primary color -->
  <rect width="200" height="200" rx="28" fill="none" stroke="#e60012" stroke-width="3" opacity="0.45"/>
</svg>