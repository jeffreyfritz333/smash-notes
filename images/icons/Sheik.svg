<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg-Sheik" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f0c1d"/>
      <stop offset="45%" stop-color="#372f6b"/>
      <stop offset="100%" stop-color="#3a0005"/>
    </linearGradient>
    <radialGradient id="glow-Sheik" cx="50%" cy="44%" r="52%">
      <stop offset="0%" stop-color="#a395f3" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#ee4d59" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ee4d59" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="emb-Sheik" x1="80" y1="20" x2="140" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#bdb4f7"/>
      <stop offset="100%" stop-color="#e2defb"/>
    </linearGradient>
    <linearGradient id="accent-Sheik" x1="0" y1="200" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e60012" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#e60012" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clip-Sheik">
      <rect width="200" height="200" rx="28"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip-Sheik)">
    <rect width="200" height="200" fill="url(#bg-Sheik)"/>
    <ellipse cx="100" cy="88" rx="110" ry="100" fill="url(#glow-Sheik)"/>

    <!-- Accent color wash -->
    <rect width="200" height="200" fill="url(#accent-Sheik)"/>

    <!-- Emblem -->
    <g fill="url(#emb-Sheik)" stroke="url(#emb-Sheik)" opacity="0.92">
      <ellipse cx="100" cy="96" rx="58" ry="34"/>
     <circle cx="100" cy="96" r="18"/>
     <circle cx="100" cy="96" r="8" opacity="0.35"/>
     <path d="M100 130 L100 168" stroke="currentColor" stroke-width="6" fill="none" opacity="0.7"/>
     <polygon points="90,160 100,178 110,160" opacity="0.7"/>
    </g>
  </g>

  <!-- Border with primary color -->
  <rect width="200" height="200" rx="28" fill="none" stroke="#7b68ee" stroke-width="3" opacity="0.45"/>
</svg>