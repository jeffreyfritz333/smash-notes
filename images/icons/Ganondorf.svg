<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg-Ganondorf" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#09000a"/>
      <stop offset="45%" stop-color="#220024"/>
      <stop offset="100%" stop-color="#3d3500"/>
    </linearGradient>
    <radialGradient id="glow-Ganondorf" cx="50%" cy="44%" r="52%">
      <stop offset="0%" stop-color="#814d85" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#f8e04d" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#f8e04d" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="emb-Ganondorf" x1="80" y1="20" x2="140" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a580a8"/>
      <stop offset="100%" stop-color="#d7c7d9"/>
    </linearGradient>
    <linearGradient id="accent-Ganondorf" x1="0" y1="200" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f5d300" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#f5d300" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clip-Ganondorf">
      <rect width="200" height="200" rx="28"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip-Ganondorf)">
    <rect width="200" height="200" fill="url(#bg-Ganondorf)"/>
    <ellipse cx="100" cy="88" rx="110" ry="100" fill="url(#glow-Ganondorf)"/>

    <!-- Accent color wash -->
    <rect width="200" height="200" fill="url(#accent-Ganondorf)"/>

    <!-- Emblem -->
    <g fill="url(#emb-Ganondorf)" opacity="0.92">
      <polygon points="100,28 160,132 40,132"/>
     <polygon points="100,56 140,124 60,124" opacity="0.2"/>
     <line x1="100" y1="28" x2="100" y2="132" stroke="rgba(0,0,0,0.15)" stroke-width="3" fill="none"/>
     <line x1="52" y1="120" x2="148" y2="120" stroke="rgba(0,0,0,0.15)" stroke-width="3" fill="none"/>
    </g>
  </g>

  <!-- Border with primary color -->
  <rect width="200" height="200" rx="28" fill="none" stroke="#4b0050" stroke-width="3" opacity="0.45"/>
</svg>