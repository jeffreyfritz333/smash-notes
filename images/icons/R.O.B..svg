<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg-R_O_B_" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#191919"/>
      <stop offset="45%" stop-color="#5f5f5f"/>
      <stop offset="100%" stop-color="#3a0005"/>
    </linearGradient>
    <radialGradient id="glow-R_O_B_" cx="50%" cy="44%" r="52%">
      <stop offset="0%" stop-color="#e0e0e0" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#ee4d59" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ee4d59" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="emb-R_O_B_" x1="80" y1="20" x2="140" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c8c8c8"/>
      <stop offset="100%" stop-color="#dadada"/>
    </linearGradient>
    <linearGradient id="accent-R_O_B_" x1="0" y1="200" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e60012" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#e60012" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clip-R_O_B_">
      <rect width="200" height="200" rx="28"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip-R_O_B_)">
    <rect width="200" height="200" fill="url(#bg-R_O_B_)"/>
    <ellipse cx="100" cy="88" rx="110" ry="100" fill="url(#glow-R_O_B_)"/>

    <!-- Accent color wash -->
    <rect width="200" height="200" fill="url(#accent-R_O_B_)"/>

    <!-- Emblem -->
    <g fill="url(#emb-R_O_B_)" opacity="0.92">
      <rect x="48" y="72" width="104" height="72" rx="12"/>
     <circle cx="78" cy="108" r="18"/>
     <circle cx="122" cy="108" r="18"/>
     <circle cx="78" cy="108" r="8" opacity="0.35"/>
     <circle cx="122" cy="108" r="8" opacity="0.35"/>
     <rect x="92" y="32" width="16" height="40" rx="4"/>
     <circle cx="100" cy="28" r="10"/>
    </g>
  </g>

  <!-- Border with primary color -->
  <rect width="200" height="200" rx="28" fill="none" stroke="#d3d3d3" stroke-width="3" opacity="0.45"/>
</svg>