<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg-Sonic" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#000a16"/>
      <stop offset="45%" stop-color="#002753"/>
      <stop offset="100%" stop-color="#3d3500"/>
    </linearGradient>
    <radialGradient id="glow-Sonic" cx="50%" cy="44%" r="52%">
      <stop offset="0%" stop-color="#4d89cd" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#f8e04d" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#f8e04d" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="emb-Sonic" x1="80" y1="20" x2="140" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#80abdc"/>
      <stop offset="100%" stop-color="#c7daef"/>
    </linearGradient>
    <linearGradient id="accent-Sonic" x1="0" y1="200" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f5d300" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#f5d300" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clip-Sonic">
      <rect width="200" height="200" rx="28"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip-Sonic)">
    <rect width="200" height="200" fill="url(#bg-Sonic)"/>
    <ellipse cx="100" cy="88" rx="110" ry="100" fill="url(#glow-Sonic)"/>

    <!-- Accent color wash -->
    <rect width="200" height="200" fill="url(#accent-Sonic)"/>

    <!-- Emblem -->
    <g fill="url(#emb-Sonic)" opacity="0.92">
      <path d="M100 32a68 68 0 1 1-.01 0zm0 26a42 42 0 1 0 .01 0z" fill-rule="evenodd"/>
     <rect x="20" y="72" width="36" height="6" rx="3" opacity="0.4"/>
     <rect x="14" y="92" width="42" height="6" rx="3" opacity="0.3"/>
     <rect x="20" y="112" width="36" height="6" rx="3" opacity="0.4"/>
    </g>
  </g>

  <!-- Border with primary color -->
  <rect width="200" height="200" rx="28" fill="none" stroke="#0057b8" stroke-width="3" opacity="0.45"/>
</svg>