<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg-Pac_Man" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1d1900"/>
      <stop offset="45%" stop-color="#6e5f00"/>
      <stop offset="100%" stop-color="#3a0005"/>
    </linearGradient>
    <radialGradient id="glow-Pac_Man" cx="50%" cy="44%" r="52%">
      <stop offset="0%" stop-color="#f8e04d" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#ee4d59" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ee4d59" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="emb-Pac_Man" x1="80" y1="20" x2="140" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e9c800"/>
      <stop offset="100%" stop-color="#f7da26"/>
    </linearGradient>
    <linearGradient id="accent-Pac_Man" x1="0" y1="200" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e60012" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#e60012" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clip-Pac_Man">
      <rect width="200" height="200" rx="28"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip-Pac_Man)">
    <rect width="200" height="200" fill="url(#bg-Pac_Man)"/>
    <ellipse cx="100" cy="88" rx="110" ry="100" fill="url(#glow-Pac_Man)"/>

    <!-- Accent color wash -->
    <rect width="200" height="200" fill="url(#accent-Pac_Man)"/>

    <!-- Emblem -->
    <g fill="url(#emb-Pac_Man)" opacity="0.92">
      <path d="M100 32a68 68 0 1 1 0 136 68 68 0 0 1 0-136zm0 0L166 72v56z" fill-rule="evenodd"/>
     <circle cx="118" cy="62" r="8" opacity="0.4"/>
    </g>
  </g>

  <!-- Border with primary color -->
  <rect width="200" height="200" rx="28" fill="none" stroke="#f5d300" stroke-width="3" opacity="0.45"/>
</svg>