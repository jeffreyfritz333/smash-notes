<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg-Yoshi" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f180e"/>
      <stop offset="45%" stop-color="#385935"/>
      <stop offset="100%" stop-color="#3d2a09"/>
    </linearGradient>
    <radialGradient id="glow-Yoshi" cx="50%" cy="44%" r="52%">
      <stop offset="0%" stop-color="#a3d69f" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#f8c165" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#f8c165" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="emb-Yoshi" x1="80" y1="20" x2="140" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#bee2bb"/>
      <stop offset="100%" stop-color="#e2f2e1"/>
    </linearGradient>
    <linearGradient id="accent-Yoshi" x1="0" y1="200" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f5a623" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#f5a623" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clip-Yoshi">
      <rect width="200" height="200" rx="28"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip-Yoshi)">
    <rect width="200" height="200" fill="url(#bg-Yoshi)"/>
    <ellipse cx="100" cy="88" rx="110" ry="100" fill="url(#glow-Yoshi)"/>

    <!-- Accent color wash -->
    <rect width="200" height="200" fill="url(#accent-Yoshi)"/>

    <!-- Emblem -->
    <g fill="url(#emb-Yoshi)" opacity="0.92">
      <ellipse cx="100" cy="100" rx="52" ry="62"/>
     <circle cx="80" cy="80" r="14" opacity="0.25"/>
     <circle cx="118" cy="110" r="12" opacity="0.25"/>
     <circle cx="90" cy="126" r="10" opacity="0.2"/>
    </g>
  </g>

  <!-- Border with primary color -->
  <rect width="200" height="200" rx="28" fill="none" stroke="#7cc576" stroke-width="3" opacity="0.45"/>
</svg>