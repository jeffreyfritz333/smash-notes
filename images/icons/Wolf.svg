<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg-Wolf" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f0c1d"/>
      <stop offset="45%" stop-color="#372f6b"/>
      <stop offset="100%" stop-color="#130021"/>
    </linearGradient>
    <radialGradient id="glow-Wolf" cx="50%" cy="44%" r="52%">
      <stop offset="0%" stop-color="#a395f3" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#814da8" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#814da8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="emb-Wolf" x1="80" y1="20" x2="140" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#bdb4f7"/>
      <stop offset="100%" stop-color="#e2defb"/>
    </linearGradient>
    <linearGradient id="accent-Wolf" x1="0" y1="200" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4b0082" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#4b0082" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clip-Wolf">
      <rect width="200" height="200" rx="28"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip-Wolf)">
    <rect width="200" height="200" fill="url(#bg-Wolf)"/>
    <ellipse cx="100" cy="88" rx="110" ry="100" fill="url(#glow-Wolf)"/>

    <!-- Accent color wash -->
    <rect width="200" height="200" fill="url(#accent-Wolf)"/>

    <!-- Emblem -->
    <g fill="url(#emb-Wolf)" opacity="0.92">
      <rect x="42" y="28" width="16" height="144" rx="8" transform="rotate(12 50 100)"/>
     <rect x="92" y="28" width="16" height="144" rx="8" transform="rotate(12 100 100)"/>
     <rect x="142" y="28" width="16" height="144" rx="8" transform="rotate(12 150 100)"/>
    </g>
  </g>

  <!-- Border with primary color -->
  <rect width="200" height="200" rx="28" fill="none" stroke="#7b68ee" stroke-width="3" opacity="0.45"/>
</svg>