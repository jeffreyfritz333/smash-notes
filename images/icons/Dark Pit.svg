<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg-Dark_Pit" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#090010"/>
      <stop offset="45%" stop-color="#22003a"/>
      <stop offset="100%" stop-color="#3a0005"/>
    </linearGradient>
    <radialGradient id="glow-Dark_Pit" cx="50%" cy="44%" r="52%">
      <stop offset="0%" stop-color="#814da8" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#ee4d59" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ee4d59" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="emb-Dark_Pit" x1="80" y1="20" x2="140" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a580c1"/>
      <stop offset="100%" stop-color="#d7c7e4"/>
    </linearGradient>
    <linearGradient id="accent-Dark_Pit" x1="0" y1="200" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e60012" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#e60012" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clip-Dark_Pit">
      <rect width="200" height="200" rx="28"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip-Dark_Pit)">
    <rect width="200" height="200" fill="url(#bg-Dark_Pit)"/>
    <ellipse cx="100" cy="88" rx="110" ry="100" fill="url(#glow-Dark_Pit)"/>

    <!-- Accent color wash -->
    <rect width="200" height="200" fill="url(#accent-Dark_Pit)"/>

    <!-- Emblem -->
    <g fill="url(#emb-Dark_Pit)" stroke="url(#emb-Dark_Pit)" opacity="0.92">
      <path d="M48 56 Q72 28 100 56 Q128 28 152 56" fill="none" stroke="currentColor" stroke-width="10"/>
     <rect x="94" y="56" width="12" height="100" rx="4"/>
     <polygon points="100,50 88,66 112,66"/>
     <path d="M62 44 A38 38 0 0 1 138 44" fill="none" stroke="currentColor" stroke-width="6" stroke-dasharray="12 8" opacity="0.4"/>
    </g>
  </g>

  <!-- Border with primary color -->
  <rect width="200" height="200" rx="28" fill="none" stroke="#4b0082" stroke-width="3" opacity="0.45"/>
</svg>