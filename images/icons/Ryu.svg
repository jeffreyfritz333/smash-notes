<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg-Ryu" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1d1d1d"/>
      <stop offset="45%" stop-color="#6c6c6c"/>
      <stop offset="100%" stop-color="#3a0005"/>
    </linearGradient>
    <radialGradient id="glow-Ryu" cx="50%" cy="44%" r="52%">
      <stop offset="0%" stop-color="#f5f5f5" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#ee4d59" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ee4d59" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="emb-Ryu" x1="80" y1="20" x2="140" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e4e4e4"/>
      <stop offset="100%" stop-color="#f2f2f2"/>
    </linearGradient>
    <linearGradient id="accent-Ryu" x1="0" y1="200" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e60012" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#e60012" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clip-Ryu">
      <rect width="200" height="200" rx="28"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip-Ryu)">
    <rect width="200" height="200" fill="url(#bg-Ryu)"/>
    <ellipse cx="100" cy="88" rx="110" ry="100" fill="url(#glow-Ryu)"/>

    <!-- Accent color wash -->
    <rect width="200" height="200" fill="url(#accent-Ryu)"/>

    <!-- Emblem -->
    <g fill="url(#emb-Ryu)" stroke="url(#emb-Ryu)" opacity="0.92">
      <circle cx="100" cy="90" r="42"/>
     <circle cx="100" cy="90" r="28" opacity="0.3"/>
     <circle cx="100" cy="90" r="14" opacity="0.2"/>
     <path d="M58 140 L78 120" stroke="currentColor" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.5"/>
     <path d="M142 140 L122 120" stroke="currentColor" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.5"/>
    </g>
  </g>

  <!-- Border with primary color -->
  <rect width="200" height="200" rx="28" fill="none" stroke="#f0f0f0" stroke-width="3" opacity="0.45"/>
</svg>