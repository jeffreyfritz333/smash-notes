<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg-Mewtwo" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#130b16"/>
      <stop offset="45%" stop-color="#462852"/>
      <stop offset="100%" stop-color="#170f23"/>
    </linearGradient>
    <radialGradient id="glow-Mewtwo" cx="50%" cy="44%" r="52%">
      <stop offset="0%" stop-color="#b98bcc" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#8c75af" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#8c75af" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="emb-Mewtwo" x1="80" y1="20" x2="140" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#cdacdb"/>
      <stop offset="100%" stop-color="#e9daef"/>
    </linearGradient>
    <linearGradient id="accent-Mewtwo" x1="0" y1="200" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5b3a8c" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#5b3a8c" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clip-Mewtwo">
      <rect width="200" height="200" rx="28"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip-Mewtwo)">
    <rect width="200" height="200" fill="url(#bg-Mewtwo)"/>
    <ellipse cx="100" cy="88" rx="110" ry="100" fill="url(#glow-Mewtwo)"/>

    <!-- Accent color wash -->
    <rect width="200" height="200" fill="url(#accent-Mewtwo)"/>

    <!-- Emblem -->
    <g fill="url(#emb-Mewtwo)" stroke="url(#emb-Mewtwo)" opacity="0.92">
      <circle cx="100" cy="80" r="40"/>
     <circle cx="100" cy="80" r="24" opacity="0.25"/>
     <path d="M96 120 Q80 150 60 170 Q58 174 62 174 Q90 162 100 140" fill="none" stroke="currentColor" stroke-width="10" opacity="0.7"/>
    </g>
  </g>

  <!-- Border with primary color -->
  <rect width="200" height="200" rx="28" fill="none" stroke="#9b59b6" stroke-width="3" opacity="0.45"/>
</svg>