<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg-Mr__Game___Watch" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#060606"/>
      <stop offset="45%" stop-color="#171717"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <radialGradient id="glow-Mr__Game___Watch" cx="50%" cy="44%" r="52%">
      <stop offset="0%" stop-color="#707070" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#949494" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#949494" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="emb-Mr__Game___Watch" x1="80" y1="20" x2="140" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#999999"/>
      <stop offset="100%" stop-color="#d2d2d2"/>
    </linearGradient>
    <linearGradient id="accent-Mr__Game___Watch" x1="0" y1="200" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#666666" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#666666" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clip-Mr__Game___Watch">
      <rect width="200" height="200" rx="28"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip-Mr__Game___Watch)">
    <rect width="200" height="200" fill="url(#bg-Mr__Game___Watch)"/>
    <ellipse cx="100" cy="88" rx="110" ry="100" fill="url(#glow-Mr__Game___Watch)"/>

    <!-- Accent color wash -->
    <rect width="200" height="200" fill="url(#accent-Mr__Game___Watch)"/>

    <!-- Emblem -->
    <g fill="url(#emb-Mr__Game___Watch)" opacity="0.92">
      <rect x="70" y="52" width="60" height="80" rx="8"/>
     <circle cx="100" cy="52" r="30"/>
     <circle cx="100" cy="52" r="18" opacity="0.25"/>
     <rect x="94" y="18" width="12" height="12" rx="4"/>
     <rect x="92" y="132" width="16" height="30" rx="4"/>
    </g>
  </g>

  <!-- Border with primary color -->
  <rect width="200" height="200" rx="28" fill="none" stroke="#333333" stroke-width="3" opacity="0.45"/>
</svg>