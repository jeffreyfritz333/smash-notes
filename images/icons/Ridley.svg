<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg-Ridley" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f0511"/>
      <stop offset="45%" stop-color="#371440"/>
      <stop offset="100%" stop-color="#3d2a09"/>
    </linearGradient>
    <radialGradient id="glow-Ridley" cx="50%" cy="44%" r="52%">
      <stop offset="0%" stop-color="#a36cb0" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#f8c165" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#f8c165" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="emb-Ridley" x1="80" y1="20" x2="140" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#bd96c7"/>
      <stop offset="100%" stop-color="#e2d1e6"/>
    </linearGradient>
    <linearGradient id="accent-Ridley" x1="0" y1="200" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f5a623" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#f5a623" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clip-Ridley">
      <rect width="200" height="200" rx="28"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip-Ridley)">
    <rect width="200" height="200" fill="url(#bg-Ridley)"/>
    <ellipse cx="100" cy="88" rx="110" ry="100" fill="url(#glow-Ridley)"/>

    <!-- Accent color wash -->
    <rect width="200" height="200" fill="url(#accent-Ridley)"/>

    <!-- Emblem -->
    <g fill="url(#emb-Ridley)" opacity="0.92">
      <path d="M100 60 L42 38 L62 90 L28 100 L68 110 L50 164 L100 120 L150 164 L132 110 L172 100 L138 90 L158 38z"/>
    </g>
  </g>

  <!-- Border with primary color -->
  <rect width="200" height="200" rx="28" fill="none" stroke="#7b2d8e" stroke-width="3" opacity="0.45"/>
</svg>