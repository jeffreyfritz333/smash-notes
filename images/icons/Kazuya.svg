<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg-Kazuya" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#09000a"/>
      <stop offset="45%" stop-color="#220024"/>
      <stop offset="100%" stop-color="#3a0005"/>
    </linearGradient>
    <radialGradient id="glow-Kazuya" cx="50%" cy="44%" r="52%">
      <stop offset="0%" stop-color="#814d85" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#ee4d59" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ee4d59" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="emb-Kazuya" x1="80" y1="20" x2="140" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a580a8"/>
      <stop offset="100%" stop-color="#d7c7d9"/>
    </linearGradient>
    <linearGradient id="accent-Kazuya" x1="0" y1="200" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e60012" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#e60012" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clip-Kazuya">
      <rect width="200" height="200" rx="28"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip-Kazuya)">
    <rect width="200" height="200" fill="url(#bg-Kazuya)"/>
    <ellipse cx="100" cy="88" rx="110" ry="100" fill="url(#glow-Kazuya)"/>

    <!-- Accent color wash -->
    <rect width="200" height="200" fill="url(#accent-Kazuya)"/>

    <!-- Emblem -->
    <g fill="url(#emb-Kazuya)" opacity="0.92">
      <path d="M100 28 L46 100 L72 100 L56 172 L154 88 L118 88 L156 28z"/>
     <circle cx="100" cy="100" r="18" opacity="0.3"/>
     <circle cx="100" cy="100" r="8" opacity="0.2"/>
    </g>
  </g>

  <!-- Border with primary color -->
  <rect width="200" height="200" rx="28" fill="none" stroke="#4b0050" stroke-width="3" opacity="0.45"/>
</svg>