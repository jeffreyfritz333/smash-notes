<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg-Zelda" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#180e1c"/>
      <stop offset="45%" stop-color="#58336b"/>
      <stop offset="100%" stop-color="#3d3500"/>
    </linearGradient>
    <radialGradient id="glow-Zelda" cx="50%" cy="44%" r="52%">
      <stop offset="0%" stop-color="#d69cf2" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#f8e04d" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#f8e04d" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="emb-Zelda" x1="80" y1="20" x2="140" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e2b8f6"/>
      <stop offset="100%" stop-color="#f2e0fb"/>
    </linearGradient>
    <linearGradient id="accent-Zelda" x1="0" y1="200" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f5d300" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#f5d300" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clip-Zelda">
      <rect width="200" height="200" rx="28"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip-Zelda)">
    <rect width="200" height="200" fill="url(#bg-Zelda)"/>
    <ellipse cx="100" cy="88" rx="110" ry="100" fill="url(#glow-Zelda)"/>

    <!-- Accent color wash -->
    <rect width="200" height="200" fill="url(#accent-Zelda)"/>

    <!-- Emblem -->
    <g fill="url(#emb-Zelda)" opacity="0.92">
      <polygon points="100,32 136,92 64,92"/>
     <polygon points="64,98 100,158 28,158"/>
     <polygon points="136,98 172,158 100,158"/>
     <circle cx="100" cy="32" r="8" opacity="0.5"/>
    </g>
  </g>

  <!-- Border with primary color -->
  <rect width="200" height="200" rx="28" fill="none" stroke="#c471ed" stroke-width="3" opacity="0.45"/>
</svg>