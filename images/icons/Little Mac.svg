<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg-Little_Mac" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#041104"/>
      <stop offset="45%" stop-color="#0f3f0f"/>
      <stop offset="100%" stop-color="#3d3500"/>
    </linearGradient>
    <radialGradient id="glow-Little_Mac" cx="50%" cy="44%" r="52%">
      <stop offset="0%" stop-color="#64ae64" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#f8e04d" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#f8e04d" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="emb-Little_Mac" x1="80" y1="20" x2="140" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#91c591"/>
      <stop offset="100%" stop-color="#cee5ce"/>
    </linearGradient>
    <linearGradient id="accent-Little_Mac" x1="0" y1="200" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f5d300" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#f5d300" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clip-Little_Mac">
      <rect width="200" height="200" rx="28"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip-Little_Mac)">
    <rect width="200" height="200" fill="url(#bg-Little_Mac)"/>
    <ellipse cx="100" cy="88" rx="110" ry="100" fill="url(#glow-Little_Mac)"/>

    <!-- Accent color wash -->
    <rect width="200" height="200" fill="url(#accent-Little_Mac)"/>

    <!-- Emblem -->
    <g fill="url(#emb-Little_Mac)" opacity="0.92">
      <ellipse cx="100" cy="86" rx="48" ry="44"/>
     <ellipse cx="100" cy="82" rx="40" ry="36" opacity="0.2"/>
     <rect x="82" y="126" width="36" height="36" rx="8"/>
    </g>
  </g>

  <!-- Border with primary color -->
  <rect width="200" height="200" rx="28" fill="none" stroke="#228b22" stroke-width="3" opacity="0.45"/>
</svg>