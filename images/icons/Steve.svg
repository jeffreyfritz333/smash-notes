<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg-Steve" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#110802"/>
      <stop offset="45%" stop-color="#3f1f09"/>
      <stop offset="100%" stop-color="#092309"/>
    </linearGradient>
    <radialGradient id="glow-Steve" cx="50%" cy="44%" r="52%">
      <stop offset="0%" stop-color="#ae7d5a" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#64ae64" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#64ae64" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="emb-Steve" x1="80" y1="20" x2="140" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c5a289"/>
      <stop offset="100%" stop-color="#e5d6cb"/>
    </linearGradient>
    <linearGradient id="accent-Steve" x1="0" y1="200" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#228b22" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#228b22" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clip-Steve">
      <rect width="200" height="200" rx="28"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip-Steve)">
    <rect width="200" height="200" fill="url(#bg-Steve)"/>
    <ellipse cx="100" cy="88" rx="110" ry="100" fill="url(#glow-Steve)"/>

    <!-- Accent color wash -->
    <rect width="200" height="200" fill="url(#accent-Steve)"/>

    <!-- Emblem -->
    <g fill="url(#emb-Steve)" opacity="0.92">
      <rect x="50" y="34" width="44" height="44" rx="4"/>
     <rect x="50" y="34" width="44" height="22" opacity="0.3"/>
     <rect x="88" y="52" width="12" height="110" rx="4" transform="rotate(0 94 107)"/>
    </g>
  </g>

  <!-- Border with primary color -->
  <rect width="200" height="200" rx="28" fill="none" stroke="#8b4513" stroke-width="3" opacity="0.45"/>
</svg>