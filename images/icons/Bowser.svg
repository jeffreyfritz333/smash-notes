<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg-Bowser" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#041104"/>
      <stop offset="45%" stop-color="#0f3f0f"/>
      <stop offset="100%" stop-color="#3d2a09"/>
    </linearGradient>
    <radialGradient id="glow-Bowser" cx="50%" cy="44%" r="52%">
      <stop offset="0%" stop-color="#64ae64" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#f8c165" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#f8c165" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="emb-Bowser" x1="80" y1="20" x2="140" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#91c591"/>
      <stop offset="100%" stop-color="#cee5ce"/>
    </linearGradient>
    <linearGradient id="accent-Bowser" x1="0" y1="200" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f5a623" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#f5a623" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clip-Bowser">
      <rect width="200" height="200" rx="28"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip-Bowser)">
    <rect width="200" height="200" fill="url(#bg-Bowser)"/>
    <ellipse cx="100" cy="88" rx="110" ry="100" fill="url(#glow-Bowser)"/>

    <!-- Accent color wash -->
    <rect width="200" height="200" fill="url(#accent-Bowser)"/>

    <!-- Emblem -->
    <g fill="url(#emb-Bowser)" opacity="0.92">
      <circle cx="100" cy="104" r="46"/>
     <polygon points="100,28 110,62 90,62"/>
     <polygon points="148,52 134,80 118,66" />
     <polygon points="160,100 130,100 138,82"/>
     <polygon points="52,52 66,80 82,66"/>
     <polygon points="40,100 70,100 62,82"/>
     <polygon points="142,140 126,118 138,108"/>
     <polygon points="58,140 74,118 62,108"/>
    </g>
  </g>

  <!-- Border with primary color -->
  <rect width="200" height="200" rx="28" fill="none" stroke="#228b22" stroke-width="3" opacity="0.45"/>
</svg>