<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg-Isabelle" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1d1900"/>
      <stop offset="45%" stop-color="#6e5f00"/>
      <stop offset="100%" stop-color="#3a0005"/>
    </linearGradient>
    <radialGradient id="glow-Isabelle" cx="50%" cy="44%" r="52%">
      <stop offset="0%" stop-color="#f8e04d" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#ee4d59" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ee4d59" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="emb-Isabelle" x1="80" y1="20" x2="140" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e9c800"/>
      <stop offset="100%" stop-color="#f7da26"/>
    </linearGradient>
    <linearGradient id="accent-Isabelle" x1="0" y1="200" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e60012" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#e60012" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clip-Isabelle">
      <rect width="200" height="200" rx="28"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip-Isabelle)">
    <rect width="200" height="200" fill="url(#bg-Isabelle)"/>
    <ellipse cx="100" cy="88" rx="110" ry="100" fill="url(#glow-Isabelle)"/>

    <!-- Accent color wash -->
    <rect width="200" height="200" fill="url(#accent-Isabelle)"/>

    <!-- Emblem -->
    <g fill="url(#emb-Isabelle)" stroke="url(#emb-Isabelle)" opacity="0.92">
      <path d="M66 120c0-38 14-68 34-76v-8a8 8 0 0 1 0 0v8c20 8 34 38 34 76z"/>
     <ellipse cx="100" cy="124" rx="42" ry="12"/>
     <circle cx="100" cy="142" r="12"/>
     <circle cx="100" cy="30" r="8"/>
     <path d="M82 28 Q76 20 82 14" fill="none" stroke="currentColor" stroke-width="4" opacity="0.5"/>
     <path d="M118 28 Q124 20 118 14" fill="none" stroke="currentColor" stroke-width="4" opacity="0.5"/>
    </g>
  </g>

  <!-- Border with primary color -->
  <rect width="200" height="200" rx="28" fill="none" stroke="#f5d300" stroke-width="3" opacity="0.45"/>
</svg>