<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg-Richter" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#080d1b"/>
      <stop offset="45%" stop-color="#1d2f65"/>
      <stop offset="100%" stop-color="#003040"/>
    </linearGradient>
    <radialGradient id="glow-Richter" cx="50%" cy="44%" r="52%">
      <stop offset="0%" stop-color="#7a96ea" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#4dd2ff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#4dd2ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="emb-Richter" x1="80" y1="20" x2="140" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a0b4f0"/>
      <stop offset="100%" stop-color="#d5def8"/>
    </linearGradient>
    <linearGradient id="accent-Richter" x1="0" y1="200" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00bfff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#00bfff" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clip-Richter">
      <rect width="200" height="200" rx="28"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip-Richter)">
    <rect width="200" height="200" fill="url(#bg-Richter)"/>
    <ellipse cx="100" cy="88" rx="110" ry="100" fill="url(#glow-Richter)"/>

    <!-- Accent color wash -->
    <rect width="200" height="200" fill="url(#accent-Richter)"/>

    <!-- Emblem -->
    <g fill="url(#emb-Richter)" stroke="url(#emb-Richter)" opacity="0.92">
      <rect x="84" y="32" width="32" height="100" rx="6"/>
     <rect x="56" y="62" width="88" height="32" rx="6"/>
     <path d="M56 156 Q48 132 66 122" fill="none" stroke="currentColor" stroke-width="6" opacity="0.4"/>
    </g>
  </g>

  <!-- Border with primary color -->
  <rect width="200" height="200" rx="28" fill="none" stroke="#4169e1" stroke-width="3" opacity="0.45"/>
</svg>