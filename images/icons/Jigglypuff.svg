<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg-Jigglypuff" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1f0d16"/>
      <stop offset="45%" stop-color="#732f51"/>
      <stop offset="100%" stop-color="#0d331e"/>
    </linearGradient>
    <radialGradient id="glow-Jigglypuff" cx="50%" cy="44%" r="52%">
      <stop offset="0%" stop-color="#ff96cb" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#70dba0" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#70dba0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="emb-Jigglypuff" x1="80" y1="20" x2="140" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffb4da"/>
      <stop offset="100%" stop-color="#ffdeef"/>
    </linearGradient>
    <linearGradient id="accent-Jigglypuff" x1="0" y1="200" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#33cc77" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#33cc77" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clip-Jigglypuff">
      <rect width="200" height="200" rx="28"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip-Jigglypuff)">
    <rect width="200" height="200" fill="url(#bg-Jigglypuff)"/>
    <ellipse cx="100" cy="88" rx="110" ry="100" fill="url(#glow-Jigglypuff)"/>

    <!-- Accent color wash -->
    <rect width="200" height="200" fill="url(#accent-Jigglypuff)"/>

    <!-- Emblem -->
    <g fill="url(#emb-Jigglypuff)" opacity="0.92">
      <circle cx="100" cy="90" r="52"/>
     <circle cx="78" cy="80" r="8" opacity="0.3"/>
     <circle cx="122" cy="80" r="8" opacity="0.3"/>
     <ellipse cx="100" cy="100" rx="6" ry="4" opacity="0.25"/>
     <rect x="120" y="130" width="10" height="34" rx="5" transform="rotate(20 125 147)"/>
     <circle cx="130" cy="162" r="10" opacity="0.6"/>
    </g>
  </g>

  <!-- Border with primary color -->
  <rect width="200" height="200" rx="28" fill="none" stroke="#ff69b4" stroke-width="3" opacity="0.45"/>
</svg>