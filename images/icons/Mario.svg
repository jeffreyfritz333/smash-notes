<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg-Mario" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1c0002"/>
      <stop offset="45%" stop-color="#670008"/>
      <stop offset="100%" stop-color="#00142a"/>
    </linearGradient>
    <radialGradient id="glow-Mario" cx="50%" cy="44%" r="52%">
      <stop offset="0%" stop-color="#ee4d59" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#4d85c2" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#4d85c2" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="emb-Mario" x1="80" y1="20" x2="140" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f38089"/>
      <stop offset="100%" stop-color="#fac7cb"/>
    </linearGradient>
    <linearGradient id="accent-Mario" x1="0" y1="200" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0051a8" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0051a8" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clip-Mario">
      <rect width="200" height="200" rx="28"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip-Mario)">
    <rect width="200" height="200" fill="url(#bg-Mario)"/>
    <ellipse cx="100" cy="88" rx="110" ry="100" fill="url(#glow-Mario)"/>

    <!-- Accent color wash -->
    <rect width="200" height="200" fill="url(#accent-Mario)"/>

    <!-- Emblem -->
    <g fill="url(#emb-Mario)" opacity="0.92">
      <circle cx="100" cy="88" r="36"/>
     <ellipse cx="72" cy="114" rx="18" ry="14" transform="rotate(-20 72 114)"/>
     <ellipse cx="58" cy="136" rx="12" ry="10" transform="rotate(-35 58 136)"/>
     <ellipse cx="128" cy="110" rx="16" ry="12" transform="rotate(25 128 110)"/>
    </g>
  </g>

  <!-- Border with primary color -->
  <rect width="200" height="200" rx="28" fill="none" stroke="#e60012" stroke-width="3" opacity="0.45"/>
</svg>