<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg-Robin" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f0c1d"/>
      <stop offset="45%" stop-color="#372f6b"/>
      <stop offset="100%" stop-color="#3d3500"/>
    </linearGradient>
    <radialGradient id="glow-Robin" cx="50%" cy="44%" r="52%">
      <stop offset="0%" stop-color="#a395f3" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#f8e04d" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#f8e04d" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="emb-Robin" x1="80" y1="20" x2="140" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#bdb4f7"/>
      <stop offset="100%" stop-color="#e2defb"/>
    </linearGradient>
    <linearGradient id="accent-Robin" x1="0" y1="200" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f5d300" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#f5d300" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clip-Robin">
      <rect width="200" height="200" rx="28"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip-Robin)">
    <rect width="200" height="200" fill="url(#bg-Robin)"/>
    <ellipse cx="100" cy="88" rx="110" ry="100" fill="url(#glow-Robin)"/>

    <!-- Accent color wash -->
    <rect width="200" height="200" fill="url(#accent-Robin)"/>

    <!-- Emblem -->
    <g fill="url(#emb-Robin)" opacity="0.92">
      <rect x="50" y="60" width="100" height="90" rx="8"/>
     <rect x="56" y="66" width="88" height="78" rx="4" opacity="0.25"/>
     <path d="M100 60 L100 150" stroke="rgba(0,0,0,0.15)" stroke-width="3" fill="none"/>
     <circle cx="100" cy="44" r="16" opacity="0.5"/>
     <circle cx="100" cy="44" r="8" opacity="0.3"/>
    </g>
  </g>

  <!-- Border with primary color -->
  <rect width="200" height="200" rx="28" fill="none" stroke="#7b68ee" stroke-width="3" opacity="0.45"/>
</svg>