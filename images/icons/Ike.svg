<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg-Ike" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00060c"/>
      <stop offset="45%" stop-color="#00172e"/>
      <stop offset="100%" stop-color="#3a0005"/>
    </linearGradient>
    <radialGradient id="glow-Ike" cx="50%" cy="44%" r="52%">
      <stop offset="0%" stop-color="#4d7094" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#ee4d59" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ee4d59" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="emb-Ike" x1="80" y1="20" x2="140" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8099b3"/>
      <stop offset="100%" stop-color="#c7d2dd"/>
    </linearGradient>
    <linearGradient id="accent-Ike" x1="0" y1="200" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e60012" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#e60012" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clip-Ike">
      <rect width="200" height="200" rx="28"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip-Ike)">
    <rect width="200" height="200" fill="url(#bg-Ike)"/>
    <ellipse cx="100" cy="88" rx="110" ry="100" fill="url(#glow-Ike)"/>

    <!-- Accent color wash -->
    <rect width="200" height="200" fill="url(#accent-Ike)"/>

    <!-- Emblem -->
    <g fill="url(#emb-Ike)" opacity="0.92">
      <rect x="86" y="26" width="28" height="100" rx="4"/>
     <polygon points="100,20 82,40 118,40"/>
     <rect x="68" y="124" width="64" height="14" rx="5"/>
     <rect x="84" y="136" width="32" height="28" rx="5"/>
     <rect x="90" y="46" width="20" height="70" rx="2" opacity="0.2"/>
    </g>
  </g>

  <!-- Border with primary color -->
  <rect width="200" height="200" rx="28" fill="none" stroke="#003366" stroke-width="3" opacity="0.45"/>
</svg>