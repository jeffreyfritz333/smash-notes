<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg-Link" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00140a"/>
      <stop offset="45%" stop-color="#004b24"/>
      <stop offset="100%" stop-color="#2c2316"/>
    </linearGradient>
    <radialGradient id="glow-Link" cx="50%" cy="44%" r="52%">
      <stop offset="0%" stop-color="#4dc185" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#c8af89" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#c8af89" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="emb-Link" x1="80" y1="20" x2="140" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#80d3a8"/>
      <stop offset="100%" stop-color="#c7ebd9"/>
    </linearGradient>
    <linearGradient id="accent-Link" x1="0" y1="200" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#b08d57" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#b08d57" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clip-Link">
      <rect width="200" height="200" rx="28"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip-Link)">
    <rect width="200" height="200" fill="url(#bg-Link)"/>
    <ellipse cx="100" cy="88" rx="110" ry="100" fill="url(#glow-Link)"/>

    <!-- Accent color wash -->
    <rect width="200" height="200" fill="url(#accent-Link)"/>

    <!-- Emblem -->
    <g fill="url(#emb-Link)" opacity="0.92">
      <rect x="94" y="22" width="12" height="100" rx="3"/>
     <polygon points="100,18 90,38 110,38"/>
     <rect x="82" y="120" width="36" height="10" rx="3"/>
     <rect x="92" y="128" width="16" height="24" rx="3"/>
     <path d="M48 90l52-32 52 32v42c0 12-52 30-52 30s-52-18-52-30z" opacity="0.3"/>
    </g>
  </g>

  <!-- Border with primary color -->
  <rect width="200" height="200" rx="28" fill="none" stroke="#00a651" stroke-width="3" opacity="0.45"/>
</svg>