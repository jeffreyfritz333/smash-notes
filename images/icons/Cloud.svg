<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg-Cloud" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#080d1b"/>
      <stop offset="45%" stop-color="#1d2f65"/>
      <stop offset="100%" stop-color="#3d3500"/>
    </linearGradient>
    <radialGradient id="glow-Cloud" cx="50%" cy="44%" r="52%">
      <stop offset="0%" stop-color="#7a96ea" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#f8e04d" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#f8e04d" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="emb-Cloud" x1="80" y1="20" x2="140" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a0b4f0"/>
      <stop offset="100%" stop-color="#d5def8"/>
    </linearGradient>
    <linearGradient id="accent-Cloud" x1="0" y1="200" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f5d300" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#f5d300" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clip-Cloud">
      <rect width="200" height="200" rx="28"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip-Cloud)">
    <rect width="200" height="200" fill="url(#bg-Cloud)"/>
    <ellipse cx="100" cy="88" rx="110" ry="100" fill="url(#glow-Cloud)"/>

    <!-- Accent color wash -->
    <rect width="200" height="200" fill="url(#accent-Cloud)"/>

    <!-- Emblem -->
    <g fill="url(#emb-Cloud)" opacity="0.92">
      <rect x="84" y="20" width="32" height="110" rx="4"/>
     <rect x="78" y="20" width="44" height="24" rx="3" opacity="0.4"/>
     <rect x="64" y="128" width="72" height="16" rx="6"/>
     <rect x="86" y="142" width="28" height="30" rx="5"/>
    </g>
  </g>

  <!-- Border with primary color -->
  <rect width="200" height="200" rx="28" fill="none" stroke="#4169e1" stroke-width="3" opacity="0.45"/>
</svg>