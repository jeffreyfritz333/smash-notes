<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg-Bowser_Jr_" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#041104"/>
      <stop offset="45%" stop-color="#0f3f0f"/>
      <stop offset="100%" stop-color="#3d2a09"/>
    </linearGradient>
    <radialGradient id="glow-Bowser_Jr_" cx="50%" cy="44%" r="52%">
      <stop offset="0%" stop-color="#64ae64" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#f8c165" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#f8c165" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="emb-Bowser_Jr_" x1="80" y1="20" x2="140" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#91c591"/>
      <stop offset="100%" stop-color="#cee5ce"/>
    </linearGradient>
    <linearGradient id="accent-Bowser_Jr_" x1="0" y1="200" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f5a623" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#f5a623" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clip-Bowser_Jr_">
      <rect width="200" height="200" rx="28"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip-Bowser_Jr_)">
    <rect width="200" height="200" fill="url(#bg-Bowser_Jr_)"/>
    <ellipse cx="100" cy="88" rx="110" ry="100" fill="url(#glow-Bowser_Jr_)"/>

    <!-- Accent color wash -->
    <rect width="200" height="200" fill="url(#accent-Bowser_Jr_)"/>

    <!-- Emblem -->
    <g fill="url(#emb-Bowser_Jr_)" opacity="0.92">
      <rect x="90" y="32" width="20" height="100" rx="4" transform="rotate(-15 100 82)"/>
     <ellipse cx="78" cy="142" rx="28" ry="20" transform="rotate(-15 78 142)"/>
     <circle cx="66" cy="148" r="10" opacity="0.4"/>
     <circle cx="88" cy="152" r="8" opacity="0.3"/>
    </g>
  </g>

  <!-- Border with primary color -->
  <rect width="200" height="200" rx="28" fill="none" stroke="#228b22" stroke-width="3" opacity="0.45"/>
</svg>