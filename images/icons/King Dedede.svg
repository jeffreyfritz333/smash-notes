<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg-King_Dedede" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1d1900"/>
      <stop offset="45%" stop-color="#6e5f00"/>
      <stop offset="100%" stop-color="#3a0005"/>
    </linearGradient>
    <radialGradient id="glow-King_Dedede" cx="50%" cy="44%" r="52%">
      <stop offset="0%" stop-color="#f8e04d" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#ee4d59" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ee4d59" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="emb-King_Dedede" x1="80" y1="20" x2="140" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e9c800"/>
      <stop offset="100%" stop-color="#f7da26"/>
    </linearGradient>
    <linearGradient id="accent-King_Dedede" x1="0" y1="200" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e60012" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#e60012" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clip-King_Dedede">
      <rect width="200" height="200" rx="28"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip-King_Dedede)">
    <rect width="200" height="200" fill="url(#bg-King_Dedede)"/>
    <ellipse cx="100" cy="88" rx="110" ry="100" fill="url(#glow-King_Dedede)"/>

    <!-- Accent color wash -->
    <rect width="200" height="200" fill="url(#accent-King_Dedede)"/>

    <!-- Emblem -->
    <g fill="url(#emb-King_Dedede)" opacity="0.92">
      <rect x="90" y="56" width="20" height="110" rx="6"/>
     <rect x="56" y="34" width="88" height="50" rx="12"/>
     <rect x="64" y="42" width="72" height="34" rx="8" opacity="0.3"/>
    </g>
  </g>

  <!-- Border with primary color -->
  <rect width="200" height="200" rx="28" fill="none" stroke="#f5d300" stroke-width="3" opacity="0.45"/>
</svg>