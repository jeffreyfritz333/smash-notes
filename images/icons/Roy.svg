<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg-Roy" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1c0002"/>
      <stop offset="45%" stop-color="#670008"/>
      <stop offset="100%" stop-color="#3d2a09"/>
    </linearGradient>
    <radialGradient id="glow-Roy" cx="50%" cy="44%" r="52%">
      <stop offset="0%" stop-color="#ee4d59" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#f8c165" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#f8c165" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="emb-Roy" x1="80" y1="20" x2="140" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f38089"/>
      <stop offset="100%" stop-color="#fac7cb"/>
    </linearGradient>
    <linearGradient id="accent-Roy" x1="0" y1="200" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f5a623" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#f5a623" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clip-Roy">
      <rect width="200" height="200" rx="28"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip-Roy)">
    <rect width="200" height="200" fill="url(#bg-Roy)"/>
    <ellipse cx="100" cy="88" rx="110" ry="100" fill="url(#glow-Roy)"/>

    <!-- Accent color wash -->
    <rect width="200" height="200" fill="url(#accent-Roy)"/>

    <!-- Emblem -->
    <g fill="url(#emb-Roy)" opacity="0.92">
      <rect x="94" y="48" width="12" height="86" rx="3"/>
     <polygon points="100,42 90,58 110,58"/>
     <rect x="78" y="132" width="44" height="10" rx="4"/>
     <rect x="90" y="140" width="20" height="22" rx="4"/>
     <ellipse cx="100" cy="58" rx="26" ry="32" opacity="0.2"/>
     <ellipse cx="100" cy="46" rx="18" ry="22" opacity="0.15"/>
    </g>
  </g>

  <!-- Border with primary color -->
  <rect width="200" height="200" rx="28" fill="none" stroke="#e60012" stroke-width="3" opacity="0.45"/>
</svg>