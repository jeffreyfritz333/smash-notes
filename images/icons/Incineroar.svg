<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg-Incineroar" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1c0002"/>
      <stop offset="45%" stop-color="#670008"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>
    <radialGradient id="glow-Incineroar" cx="50%" cy="44%" r="52%">
      <stop offset="0%" stop-color="#ee4d59" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#707070" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#707070" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="emb-Incineroar" x1="80" y1="20" x2="140" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f38089"/>
      <stop offset="100%" stop-color="#fac7cb"/>
    </linearGradient>
    <linearGradient id="accent-Incineroar" x1="0" y1="200" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#333333" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#333333" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clip-Incineroar">
      <rect width="200" height="200" rx="28"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip-Incineroar)">
    <rect width="200" height="200" fill="url(#bg-Incineroar)"/>
    <ellipse cx="100" cy="88" rx="110" ry="100" fill="url(#glow-Incineroar)"/>

    <!-- Accent color wash -->
    <rect width="200" height="200" fill="url(#accent-Incineroar)"/>

    <!-- Emblem -->
    <g fill="url(#emb-Incineroar)" stroke="url(#emb-Incineroar)" opacity="0.92">
      <ellipse cx="100" cy="100" rx="56" ry="56" fill="none" stroke="currentColor" stroke-width="14"/>
     <ellipse cx="100" cy="100" rx="38" ry="38" fill="none" stroke="currentColor" stroke-width="6" opacity="0.35"/>
     <polygon points="100,52 108,76 132,76 112,92 120,116 100,100 80,116 88,92 68,76 92,76"/>
    </g>
  </g>

  <!-- Border with primary color -->
  <rect width="200" height="200" rx="28" fill="none" stroke="#e60012" stroke-width="3" opacity="0.45"/>
</svg>